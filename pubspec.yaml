name: paycay_mobile
description: "PAYCAY Mobile - Smart EV Charging Station App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0

  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_database: ^11.3.0
  firebase_messaging: ^15.2.0
  # firebase_storage: ^12.4.0  # Aktifkan setelah upgrade ke Blaze plan

  # Local storage (untuk persist auth token & cache)
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
